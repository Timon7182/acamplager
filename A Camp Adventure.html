  <style>
    :root {
      --cream: #F8EFD9;
      --cream-2: #F1E4C2;
      --paper: #FFFBF0;
      --sky: #BCE3F0;
      --sky-2: #D8EFF6;
      --ink: #2A2620;
      --leaf: #6FAE52;
      --leaf-2: #4F8B3E;
      --grass: #C9DC8B;
      --gold: #F4C148;
      --coral: #E8675D;
      --pink: #F4ABB6;
      --sand: #EFD9A8;
      --blue: #6FB7E6;
      --water: #98D2E6;
    }
    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
    }
    .font-bubble { font-family: 'Fredoka', sans-serif; font-weight: 700; letter-spacing: -0.01em; }
    .font-hand { font-family: 'Caveat', cursive; font-weight: 700; }
    .font-marker { font-family: 'Patrick Hand', cursive; }

    /* Bubble letter — chunky with white stroke + offset shadow */
    .bubble {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      display: inline-block;
      -webkit-text-stroke: 10px #FFFBF0;
      paint-order: stroke fill;
      filter: drop-shadow(0 5px 0 rgba(42,38,32,0.25));
      line-height: 0.85;
    }
    .bubble-sm {
      -webkit-text-stroke: 5px #FFFBF0;
      filter: drop-shadow(0 3px 0 rgba(42,38,32,0.22));
    }
    .bubble-xs {
      -webkit-text-stroke: 3.5px #FFFBF0;
      filter: drop-shadow(0 2px 0 rgba(42,38,32,0.2));
    }

    /* Polaroid */
    .polaroid {
      background: #FFFBF0;
      padding: 10px 10px 38px 10px;
      box-shadow: 0 12px 28px -10px rgba(42,38,32,0.28), 0 2px 0 rgba(42,38,32,0.05);
      border-radius: 4px;
      position: relative;
    }
    .polaroid img { display: block; width: 100%; height: 100%; object-fit: cover; }
    .polaroid::after {
      content: "";
      position: absolute;
      top: -18px; left: 50%;
      transform: translateX(-50%) rotate(-3deg);
      width: 70px; height: 22px;
      background: rgba(244, 193, 72, 0.6);
      border: 1px dashed rgba(42,38,32,0.18);
      box-shadow: 0 2px 6px rgba(42,38,32,0.12);
    }

    /* Tape (washi) */
    .tape {
      position: absolute;
      width: 90px; height: 26px;
      background: rgba(232, 103, 93, 0.55);
      border: 1px solid rgba(255,255,255,0.4);
      box-shadow: 0 3px 8px rgba(42,38,32,0.18);
    }
    .tape::before, .tape::after {
      content: "";
      position: absolute;
      top: 0; bottom: 0; width: 6px;
      background: repeating-linear-gradient(45deg, transparent 0 3px, rgba(42,38,32,0.08) 3px 4px);
    }
    .tape::before { left: 0; }
    .tape::after { right: 0; }

    /* Pin */
    .pin {
      width: 16px; height: 16px; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #FF8B7A, #C0463E);
      box-shadow: 0 4px 8px rgba(42,38,32,0.4), inset -2px -2px 4px rgba(0,0,0,0.18);
    }

    /* Cloud */
    @keyframes drift {
      0% { transform: translateX(0); }
      100% { transform: translateX(40px); }
    }
    .cloud { animation: drift 12s ease-in-out infinite alternate; }

    /* Sway leaves */
    @keyframes sway {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }
    .sway { transform-origin: bottom center; animation: sway 5s ease-in-out infinite; }
    .sway-slow { animation: sway 7s ease-in-out infinite; }
    .sway-fast { animation: sway 4s ease-in-out infinite; }

    /* Bounce on hover */
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .bob { animation: bob 2.4s ease-in-out infinite; }

    /* Wavy water shimmer */
    @keyframes shimmer {
      0% { transform: translateX(0); }
      100% { transform: translateX(-40px); }
    }
    .water-shimmer { animation: shimmer 8s linear infinite; }

    /* Squiggle underline */
    .squiggle {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 12'><path d='M2 8 Q 22 0, 42 8 T 82 8 T 122 8 T 162 8' stroke='%23E8675D' stroke-width='3' fill='none' stroke-linecap='round'/></svg>");
      background-repeat: no-repeat;
      background-position: bottom center;
      background-size: 100% 10px;
      padding-bottom: 14px;
    }

    /* Sticker badge */
    .sticker-tag {
      background: var(--paper);
      border: 3px solid var(--ink);
      border-radius: 999px;
      padding: 8px 18px;
      box-shadow: 0 4px 0 var(--ink);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .sticker-tag:hover { transform: translate(-1px, -2px); box-shadow: 0 6px 0 var(--ink); }
    .sticker-tag:active { transform: translate(0, 2px); box-shadow: 0 0 0 var(--ink); }

    /* Big CTA */
    .cta-big {
      background: var(--coral);
      color: var(--paper);
      border: 3px solid var(--ink);
      border-radius: 999px;
      box-shadow: 0 5px 0 var(--ink);
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .cta-big:hover { transform: translateY(-2px); box-shadow: 0 7px 0 var(--ink); }
    .cta-big:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--ink); }

    /* Reveal */
    .reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.7s cubic-bezier(.2,.8,.2,1); }
    .reveal.in { opacity: 1; transform: translateY(0); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 12px; height: 12px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--ink); border: 3px solid var(--cream); border-radius: 6px; }

    /* Paper texture noise */
    .paper-noise::after {
      content: "";
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.16 0 0 0 0 0.15 0 0 0 0 0.13 0 0 0 0.08 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
      mix-blend-mode: multiply;
      opacity: 0.5;
      pointer-events: none;
    }

    /* Stamp */
    .stamp {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--coral);
      border: 3px solid var(--coral);
      padding: 4px 10px;
      transform: rotate(-6deg);
      display: inline-block;
      font-size: 11px;
      text-transform: uppercase;
    }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    }
  </style>
